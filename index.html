<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/decision-gate/manifest.json">
<title>🧠 期权决策辅助</title>
<style>
:root {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --border: #e5e5ea;
  --text: #1c1c1e;
  --muted: #8e8e93;
  --purple: #7c3aed;
  --purple-bg: #7c3aed10;
  --purple-border: #7c3aed30;
  --green: #34c759;
  --green-bg: #34c75915;
  --red: #ff3b30;
  --red-bg: #ff3b3015;
  --amber: #ff9500;
  --amber-bg: #ff950015;
  --blue: #007aff;
  --radius: 14px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;font-size:17px;
  min-height:100vh;padding-bottom:80px;
  -webkit-font-smoothing:antialiased;
}
.container{max-width:480px;margin:0 auto;padding:16px;}

/* Header */
.header{padding:20px 0 12px;text-align:center;}
.header h1{font-size:1.4rem;font-weight:700;}
.header .score-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
.header .trust-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface2);padding:8px 16px;border-radius:20px;
  font-size:.9rem;font-weight:600;
}
.trust-badge .val{color:var(--purple);font-size:1.2rem;}
.trust-badge .trend{font-size:.8rem;}
.trust-badge .trend.up{color:var(--green);}
.version-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;font-size:.75rem;color:var(--muted)}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--purple);padding:3px 12px;border-radius:10px;font-size:.75rem;cursor:pointer;font-family:inherit;}
.refresh-btn:active{opacity:.7;}

/* Event banner */
.event-banner{
  background:var(--amber-bg);border:1px solid #ff950030;
  border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;
  font-size:.9rem;display:none;
}
.event-banner.show{display:flex;align-items:center;gap:8px;}
.event-banner .icon{font-size:1.3rem;}

/* Tab bar */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 0 var(--safe-bottom);
  z-index:100;max-width:480px;margin:0 auto;
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:var(--muted);
  font-size:.8rem;padding:6px 12px;cursor:pointer;
  transition:color .15s;font-family:inherit;font-weight:500;
}
.tab-btn .ico{font-size:1.4rem;}
.tab-btn.active{color:var(--purple);}

/* Tab content */
.tab-page{display:none;}
.tab-page.active{display:block;}

/* Cards */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;margin-bottom:12px;
}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:600;font-size:1.05rem;}
.card-header .ico{font-size:1.2rem;}
.card-sub{font-size:.88rem;color:var(--muted);margin-bottom:14px;}

/* Step progress */
.steps{display:flex;gap:4px;margin-bottom:16px;}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .2s;}
.step-dot.done{background:var(--purple);}
.step-dot.active{background:var(--purple);box-shadow:0 0 6px var(--purple);}

/* Form elements */
.field{margin-bottom:14px;}
.field label{display:block;font-size:.88rem;color:var(--muted);margin-bottom:5px;}
.field .help{font-size:.78rem;color:var(--muted);margin-top:2px;}
input[type="text"],input[type="number"],select{
  width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:1rem;
  font-family:inherit;-webkit-appearance:none;
}
input:focus,select:focus{outline:none;border-color:var(--purple);}
textarea{
  width:100%;min-height:70px;padding:12px 14px;background:var(--bg);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:.95rem;font-family:inherit;resize:vertical;
}
textarea:focus{outline:none;border-color:var(--purple);}

/* Toggle row */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:.95rem;flex:1;}
.toggle-hint{font-size:.78rem;color:var(--muted);margin-left:6px;}
.toggle{
  display:flex;gap:4px;flex-shrink:0;
}
.toggle button{
  padding:7px 16px;border-radius:16px;border:1.5px solid var(--border);
  background:none;cursor:pointer;font-size:.88rem;color:var(--muted);
  transition:all .12s;font-family:inherit;
}
.toggle button.on{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600;}
.toggle button.off{background:var(--red-bg);border-color:var(--red);color:var(--red);font-weight:600;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:14px 24px;border-radius:var(--radius-sm);border:none;
  cursor:pointer;font-size:1rem;font-weight:600;font-family:inherit;
  transition:all .15s;width:100%;text-align:center;
}
.btn-primary{background:var(--purple);color:#fff;}
.btn-primary:hover{background:#7c3aed;}
.btn-primary:disabled{opacity:.4;pointer-events:none;}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:none;border:1.5px solid var(--red);color:var(--red);}
.btn-sm{padding:9px 18px;font-size:.9rem;width:auto;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* Decision result */
.result-banner{
  padding:20px;border-radius:var(--radius-sm);text-align:center;margin-bottom:12px;
}
.result-banner.go{background:var(--green-bg);border:1px solid #34c75930;}
.result-banner.no{background:var(--red-bg);border:1px solid #ff3b3030;}
.result-banner.wait{background:var(--amber-bg);border:1px solid #ff950030;}
.result-banner .big{font-size:2.5rem;margin-bottom:4px;}
.result-banner .msg{font-weight:600;font-size:1.05rem;}
.result-banner .detail{font-size:.9rem;color:var(--muted);margin-top:4px;}

/* Trade list */
.trade-item{
  background:var(--surface2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;
  border-left:3px solid var(--border);
}
.trade-item.compliant{border-left-color:var(--green);}
.trade-item.violated{border-left-color:var(--red);}
.trade-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.trade-symbol{font-weight:700;font-size:1.05rem;}
.trade-result{font-weight:700;font-size:.95rem;}
.trade-result.win{color:var(--green);}
.trade-result.loss{color:var(--red);}
.trade-row-mid{font-size:.88rem;color:var(--muted);margin-bottom:2px;}
.trade-row-bot{font-size:.82rem;color:var(--muted);display:flex;gap:10px;}

/* Quiz */
.quiz-card{background:var(--surface2);border-radius:var(--radius);padding:20px;margin-bottom:12px;}
.quiz-type{font-size:.8rem;color:var(--purple);font-weight:600;margin-bottom:6px;text-transform:uppercase;}
.quiz-question{font-size:1rem;font-weight:500;margin-bottom:16px;line-height:1.6;}
.quiz-options{list-style:none;}
.quiz-options li{
  padding:14px 16px;margin-bottom:8px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);cursor:pointer;font-size:.95rem;
  transition:all .15s;
}
.quiz-options li:hover{border-color:var(--purple-border);}
.quiz-options li.selected{border-color:var(--purple);background:var(--purple-bg);}
.quiz-options li.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.quiz-options li.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.quiz-feedback{font-size:.9rem;margin-top:10px;padding:12px;border-radius:var(--radius-sm);display:none;line-height:1.5;}
.quiz-feedback.show{display:block;}
.quiz-feedback.good{background:var(--green-bg);}
.quiz-feedback.bad{background:var(--red-bg);}
.quiz-source{font-size:.8rem;color:var(--muted);margin-top:6px;}
.quiz-score{text-align:center;padding:8px;font-size:.95rem;color:var(--muted);}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-item{background:var(--surface2);border-radius:var(--radius-sm);padding:16px;text-align:center;}
.stat-item .num{font-size:1.7rem;font-weight:700;}
.stat-item .lbl{font-size:.8rem;color:var(--muted);margin-top:2px;}
.stat-item .num.green{color:var(--green);}
.stat-item .num.red{color:var(--red);}
.stat-item .num.purple{color:var(--purple);}

.insight-box{
  background:var(--purple-bg);border:1px solid var(--purple-border);
  border-radius:var(--radius-sm);padding:14px 16px;font-size:.9rem;margin-top:10px;line-height:1.5;
}
.insight-box strong{color:var(--purple);}

/* Date nav */
.date-nav{
  display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px;
}
.date-nav button{
  background:var(--surface2);border:none;color:var(--text);
  padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:.95rem;font-family:inherit;
}
.date-nav span{font-size:.95rem;font-weight:600;}

/* Toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--purple);color:#fff;padding:12px 22px;
  border-radius:20px;font-size:.9rem;font-weight:600;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.toast.show{opacity:1;}

/* links in quiz */
.quiz-source a{color:var(--purple);text-decoration:underline;}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Header -->
  <div class="header">
    <h1>🧠 期权决策辅助</h1>
    <div style="font-size:.8rem;color:var(--muted);margin-bottom:4px" id="headerDate"></div>
    <div class="score-row">
      <div class="trust-badge">
        信任分 <span class="val" id="trustScore">--</span>
        <span class="trend" id="trustTrend"></span>
      </div>
    </div>
    <div class="version-row">
      v1.0 <button class="refresh-btn" onclick="checkUpdate()">🔄 更新</button>
      <button class="refresh-btn" onclick="exportData()">📤 导出</button>
      <button class="refresh-btn" onclick="document.getElementById('importFile').click()">📥 导入</button>
      <button class="refresh-btn" onclick="showSettings()">⚙️</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>

  <!-- Event Banner -->
  <div class="event-banner" id="eventBanner">
    <span class="icon">📅</span>
    <span id="eventText"></span>
  </div>

  <!-- Tab 1: Decision Gate -->
  <div class="tab-page active" id="tab-gate">
    <div class="card">
      <div class="card-header"><span class="ico">🔍</span> 今日决策门</div>
      <div class="card-sub" id="gateSub">交易前必须完成。不通过就不开仓。</div>
      <div class="steps" id="steps"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div></div>
      <div id="gateContent"></div>
    </div>
  </div>

  <!-- Tab 2: Trade Log -->
  <div class="tab-page" id="tab-log">
    <div class="card">
      <div class="card-header"><span class="ico">📝</span> 交易日志</div>
      <div id="logList"><div style="text-align:center;color:var(--muted);padding:20px;font-size:.9rem">还没有交易记录</div></div>
    </div>
  </div>

  <!-- Tab 3: Learn -->
  <div class="tab-page" id="tab-learn">
    <div class="card">
      <div class="card-header"><span class="ico">📚</span> 每日学习</div>
      <div class="card-sub">每天 5 道题 · 6 层级由浅入深。答对 3 天后复习，答错明天重考，连续 3 对即掌握。</div>
      <div class="quiz-score" id="quizSummary">今日：<span id="quizToday">0</span>/<span id="quizTotal">5</span> · 连对 <span id="quizStreak">0</span> 题</div>
      <div id="quizContent"></div>
    </div>
  </div>

  <!-- Tab 4: Dashboard -->
  <div class="tab-page" id="tab-dash">
    <div class="card">
      <div class="card-header"><span class="ico">📊</span> 信任看板</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="num purple" id="dGateRate">--</div><div class="lbl">决策门使用率</div></div>
        <div class="stat-item"><div class="num green" id="dCompWin">--</div><div class="lbl">合规交易胜率</div></div>
        <div class="stat-item"><div class="num red" id="dVioWin">--</div><div class="lbl">违规交易胜率</div></div>
        <div class="stat-item"><div class="num" id="dBlock">--</div><div class="lbl">系统拦截次数</div></div>
      </div>
      <div class="insight-box" id="dInsight"></div>
    </div>

    <div class="card">
      <div class="card-header"><span class="ico">📈</span> 学习进度</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="num purple" id="dQTotal">--</div><div class="lbl">总答题</div></div>
        <div class="stat-item"><div class="num green" id="dQCorrect">--</div><div class="lbl">正确率</div></div>
        <div class="stat-item"><div class="num" id="dQStreak">--</div><div class="lbl">最长连对</div></div>
        <div class="stat-item"><div class="num" id="dQMastered">--</div><div class="lbl">已掌握</div></div>
      </div>
      <div class="insight-box" id="dLearnInsight"></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="gate"><span class="ico">🔍</span>决策门</button>
    <button class="tab-btn" data-tab="log"><span class="ico">📝</span>日志</button>
    <button class="tab-btn" data-tab="learn"><span class="ico">📚</span>学习</button>
    <button class="tab-btn" data-tab="dash"><span class="ico">📊</span>看板</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<script>
// ═══════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════
const KEY = 'decision-system-v1';
const now = () => new Date().toISOString().slice(0,10);

function load(){ try{return JSON.parse(localStorage.getItem(KEY))||initData();}catch{return initData();} }
function save(d){ localStorage.setItem(KEY,JSON.stringify(d)); }

function initData(){
  return {
    gates: {},
    trades: [],
    quiz: { answers:{}, daily:{}, streak:0, maxStreak:0, mastered:[] }
  };
}

let data = load();
let currentStep = 0;
let gateForm = { spy:'', vix:'', event:'', tenY:'', symbol:'', pullback:null, ivRank:null, spy50DMA:null, tenYok:null, size:'standard', dte:'30', stopLoss:'', takeProfit:'', reason:'' };
let quizAnswered = false;
let quizResults = [];

// ═══════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    if(tab==='gate') renderGate();
    if(tab==='log') renderLog();
    if(tab==='learn') renderLearn();
    if(tab==='dash') renderDash();
  });
});

// ═══════════════════════════════════
// DECISION GATE
// ═══════════════════════════════════
function renderGate(){
  const today = now();
  const g = data.gates[today];
  if(g && g.completed){
    showGateResult(g);
  } else {
    showGateStep(currentStep);
  }
  // Event check
  checkEvents(today);
}

function checkEvents(d){
  const events = {
    '2026-06-11': 'CPI 发布日 ⚠️ 数据前不开仓',
  };
  // Simple CPI/FOMC detection: roughly mid-month
  const day = parseInt(d.slice(8));
  const month = d.slice(0,7);
  const banner = document.getElementById('eventBanner');
  const text = document.getElementById('eventText');
  if(day >= 10 && day <= 12){
    text.textContent = '可能为 CPI 发布日 ⚠️ 确认后数据前不开仓';
    banner.classList.add('show');
  } else if(day >= 16 && day <= 19){
    text.textContent = '可能为 FOMC 周 ⚠️ 利率决议前后谨慎开仓';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function showGateStep(step){
  currentStep = step;
  const steps = document.getElementById('steps');
  steps.innerHTML = [0,1,2,3].map(i => {
    let cls = '';
    if(i < step) cls = 'done';
    else if(i === step) cls = 'active';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');

  let html = '';
  const sub = document.getElementById('gateSub');

  if(step === 0){
    sub.textContent = '第 1 步：输入今日市场环境' + (localStorage.getItem('finnhub_key')||localStorage.getItem('twelvedata_key') ? '（可自动获取）' : '');
    const hasKey = localStorage.getItem('finnhub_key') || localStorage.getItem('twelvedata_key');
    html += `<button class="btn btn-outline" onclick="fetchMarketData()" id="btnFetch" style="margin-bottom:12px;width:100%">📡 自动获取行情（SPY/VIX/10Y）${hasKey?'':' — 需先设置 ⚙️'}</button>`;
    html += `<div class="field"><label>SPY 价格</label><input type="text" id="fSpy" placeholder="例: 748" value="${gateForm.spy}"></div>`;
    html += `<div class="field"><label>VIX</label><input type="text" id="fVix" placeholder="例: 16.7" value="${gateForm.vix}"></div>`;
    html += `<div class="field"><label>10Y 美债收益率 (%)</label><input type="text" id="fTenY" placeholder="例: 4.63" value="${gateForm.tenY}"></div>`;
    html += `<div class="field"><label>今日事件</label><select id="fEvent"><option value="">无重大事件</option><option value="cpi">CPI 发布</option><option value="fomc">FOMC</option><option value="nfp">NFP</option><option value="earnings">重要财报</option></select></div>`;
    html += `<button class="btn btn-primary" onclick="nextStep(0)">下一步 →</button>`;
    html += `<div class="help" style="margin-top:8px;text-align:center">也可<a href="#" onclick="useDefaults()" style="color:var(--purple)">使用保守默认值</a></div>`;
  } else if(step === 1){
    sub.textContent = '第 2 步：选择标的 + 确认入场条件';
    html += `<div class="field"><label>标的</label><select id="fSymbol"><option value="">-- 选择 --</option><option value="NVDA">NVDA 🥇 AI龙头</option><option value="SOXX">SOXX 🥈 半导体ETF</option><option value="DRAM">DRAM 🥈 存储ETF</option><option value="INTC">INTC 🥉 事件埋伏</option></select></div>`;
    html += toggleRow('回调 ≥ 3%（距20日高）', 'fPullback', gateForm.pullback, '涨停之后必须回调才买');
    html += toggleRow('IV Rank < 80', 'fIvRank', gateForm.ivRank, '80以上暂停该标的');
    html += toggleRow('SPY 在 50 DMA 上方', 'fSpyDMA', gateForm.spy50DMA, '跌破降一级，不暂停');
    html += toggleRow('10Y 单日波动 < 15bp', 'fTenYok', gateForm.tenYok, '≥15bp 不开新仓');
    html += `<div class="btn-row" style="margin-top:12px"><button class="btn btn-outline" onclick="currentStep=0;renderGate();saveGateDraft()">← 上一步</button><button class="btn btn-primary" onclick="nextStep(1)">下一步 →</button></div>`;
  } else if(step === 2){
    sub.textContent = '第 3 步：确认风险参数';
    html += `<div class="field"><label>仓位级别</label><select id="fSize"><option value="standard">🥉 标准出击 $400-600</option><option value="priority">🥈 重点出击 $700-1000</option><option value="full">🥇 全力一击 $1000-1500</option></select></div>`;
    html += `<div class="field"><label>DTE（天数）</label><input type="number" id="fDte" value="${gateForm.dte}" min="1" max="60"></div>`;
    html += `<div class="field"><label>止盈条件</label><input type="text" id="fTP" placeholder="例: +80% 出一半，+150% 全平" value="${gateForm.takeProfit}"></div>`;
    html += `<div class="field"><label>止损条件</label><input type="text" id="fSL" placeholder="例: -80% 无条件全平" value="${gateForm.stopLoss}"></div>`;

  } else if(step === 3){
    sub.textContent = '第 4 步：一句话理由 + 确认';
    html += `<div class="field"><label>为什么做这笔交易？（必填）</label><textarea id="fReason" placeholder="例: NVDA 财报后回调 4%，IV crush 已完成，30 DTE Call 搏反弹">${gateForm.reason}</textarea></div>`;
    html += `<div class="card-sub" style="background:var(--surface2);padding:10px;border-radius:var(--radius-sm);margin-bottom:12px">
      <strong>📋 确认清单</strong><br>
      标的：<span id="confirmSymbol">${gateForm.symbol||'未选'}</span> ·
      仓位：<span id="confirmSize">${gateForm.size}</span> ·
      DTE：<span id="confirmDte">${gateForm.dte}</span>
    </div>`;
    html += `<div class="btn-row"><button class="btn btn-outline" onclick="currentStep=2;renderGate();saveGateDraft()">← 上一步</button><button class="btn btn-primary" id="btnSubmit" onclick="submitGate()">✅ 确认 — 可以交易</button></div>`;
  }
  document.getElementById('gateContent').innerHTML = html;

  // Restore field values
  if(step===0){
    document.getElementById('fEvent').value = gateForm.event;
  }
  if(step===1){
    setTimeout(()=>{
      const sel = document.getElementById('fSymbol');
      if(sel) sel.value = gateForm.symbol;
    },10);
  }
  if(step===2){
    setTimeout(()=>{
      const sz = document.getElementById('fSize');
      if(sz) sz.value = gateForm.size;
    },10);
  }
  if(step===3){
    setTimeout(()=>{ updateConfirm(); },10);
  }
}

async function fetchWithRetry(url, retries=2){
  for(let i=0;i<=retries;i++){
    try{ const r=await fetch(url); if(r.ok) return r; }catch(e){}
    if(i<retries) await new Promise(r=>setTimeout(r,500*(i+1)));
  }
  return null;
}

async function fetchMarketData(){
  const fKey = localStorage.getItem('finnhub_key');
  const tKey = localStorage.getItem('twelvedata_key');
  if(!fKey && !tKey){
    showToast('⚙️ 请先设置 API Key → 点顶部 ⚙️');
    return;
  }
  const btn = document.getElementById('btnFetch');
  if(btn){ btn.textContent = '⏳ 获取中...'; btn.disabled = true; }

  let results = [], errors = [];

  // Helper: fetch single symbol from Finnhub
  async function fh(sym){ const r=await fetchWithRetry('https://finnhub.io/api/v1/quote?symbol='+sym+'&token='+fKey); if(!r) throw new Error('timeout'); const d=await r.json(); if(d.error) throw new Error(d.error); return d.c; }
  // Helper: fetch single symbol from Twelve Data
  async function td(sym){ const r=await fetchWithRetry('https://api.twelvedata.com/price?symbol='+sym+'&apikey='+tKey); if(!r) throw new Error('timeout'); const d=await r.json(); if(d.code) throw new Error(d.message); return parseFloat(d.price); }

  // Source 1: Finnhub
  if(fKey){
    try{
      const spy = await fh('SPY');
      let vix=null, tnx=null, vixErr='', tnxErr='';
      try{ vix = await fh('%5EVIX'); }catch(e){ vixErr = e.message; errors.push('VIX: '+e.message); }
      try{ tnx = await fh('%5ETNX'); }catch(e){ tnxErr = e.message; errors.push('10Y: '+e.message); }
      const missing = (vix===null?1:0)+(tnx===null?1:0);
      results.push({src:'Finnhub', spy, vix:vix||0, tnx:tnx||0, partial: missing>0, missingVix:!vix, missingTnx:!tnx});
    }catch(e){ errors.push('Finnhub SPY: '+e.message); }
  }

  // Source 2: Twelve Data
  if(tKey){
    try{
      const spy = await td('SPY');
      let vix=null, tnx=null;
      try{ vix = await td('VIX'); }catch(e){ errors.push('VIX: '+e.message); }
      try{ tnx = await td('TNX'); }catch(e){ errors.push('10Y: '+e.message); }
      results.push({src:'TwelveData', spy, vix:vix||0, tnx:tnx||0, partial: (vix===null||tnx===null)});
    }catch(e){ errors.push('TwelveData SPY: '+e.message); }
  }

  if(results.length === 0){
    if(btn){ btn.textContent = '📡 重试'; btn.disabled = false; }
    showToast('⚠️ 获取失败: ' + (errors.slice(0,2).join('; ') || '网络错误'));
    return;
  }

  const primary = results[0];
  gateForm.spy = primary.spy.toFixed(0);
  gateForm.vix = primary.vix ? primary.vix.toFixed(1) : '';
  gateForm.tenY = primary.tnx ? primary.tnx.toFixed(2) : '';
  currentStep = 0; renderGate();

  let msg = '✅ SPY ' + gateForm.spy;
  if(gateForm.vix) msg += ' · VIX ' + gateForm.vix;
  if(gateForm.tenY) msg += ' · 10Y ' + gateForm.tenY + '%';

  if(results.length >= 2){
    const spyDiff = Math.abs(results[0].spy - results[1].spy);
    const pctDiff = (spyDiff / results[0].spy * 100).toFixed(2);
    msg += pctDiff > 2 ? ' ⚠️ 两源差'+pctDiff+'%' : ' ✓ 验证通过';
  }
  msg += ' [' + results.map(r=>r.src).join('+') + ']';
  if(results[0].partial) msg += ' (部分字段缺失)';
  showToast(msg);
  if(btn){ btn.textContent = '📡 自动获取行情（SPY/VIX/10Y）'; btn.disabled = false; }
}

async function saveApiKey(){
  const fk = document.getElementById('finnhubKey').value.trim();
  const tk = document.getElementById('twelvedataKey').value.trim();
  if(!fk && !tk){ showToast('请至少输入一个 API Key'); return; }

  // Validate keys
  let status = [];
  if(fk){
    try{
      const r = await fetch('https://finnhub.io/api/v1/quote?symbol=SPY&token='+fk);
      const d = await r.json();
      if(d.c !== undefined){
        localStorage.setItem('finnhub_key', fk);
        status.push('Finnhub ✅');
      } else {
        status.push('Finnhub ❌ ' + (d.error||'无效'));
      }
    }catch(e){ status.push('Finnhub ❌ 网络错误'); }
  }
  if(tk){
    try{
      const r = await fetch('https://api.twelvedata.com/price?symbol=SPY&apikey='+tk);
      const d = await r.json();
      if(d.price && !d.code){
        localStorage.setItem('twelvedata_key', tk);
        status.push('TwelveData ✅');
      } else {
        status.push('TwelveData ❌ ' + (d.message||'无效'));
      }
    }catch(e){ status.push('TwelveData ❌ 网络错误'); }
  }
  showToast('💾 ' + status.join(' · '));
  if(status.some(s=>s.includes('✅'))){
    resetGate();
    setTimeout(fetchMarketData, 300); // Auto-fetch after saving keys
  }
}

function nextStep(fromStep){
  saveGateDraft();
  // Validate
  if(fromStep === 0){
    if(!gateForm.spy && !gateForm.vix){ showToast('至少填入 SPY 价格或用默认值'); return; }
  }
  if(fromStep === 1){
    if(!gateForm.symbol){ showToast('请选择标的'); return; }
    if(gateForm.pullback === null){ showToast('请确认回调条件'); return; }
    if(gateForm.ivRank === null){ showToast('请确认 IV Rank 条件'); return; }
    // Block CPI/FOMC days
    if(gateForm.event === 'cpi' || gateForm.event === 'fomc'){
      showToast('⚠️ 事件日禁止开新仓'); return;
    }
    if(!gateForm.pullback){ currentStep = 1; showNoGo('回调条件不满足——距20日高回调不足3%。等。'); return; }
    if(gateForm.ivRank === false){ currentStep = 1; showNoGo('IV Rank ≥ 80——暂停该标的或降级。'); return; }
  }
  if(fromStep === 2){
    // All clear
    if(!gateForm.takeProfit) gateForm.takeProfit = '+80% 出一半，+150% 全平';
    if(!gateForm.stopLoss) gateForm.stopLoss = '-80% 无条件全平';
  }
  if(fromStep === 3) return; // Submit handles this
  currentStep = fromStep + 1;
  renderGate();
}

function submitGate(){
  saveGateDraft();
  if(!gateForm.reason.trim()){ showToast('请填写交易理由'); return; }
  const today = now();
  const allPass = gateForm.pullback === true && gateForm.ivRank === true;

  data.gates[today] = {
    completed: true,
    timestamp: new Date().toISOString(),
    market: { spy: gateForm.spy, vix: gateForm.vix, event: gateForm.event, tenY: gateForm.tenY },
    symbol: gateForm.symbol,
    conditions: { pullback: gateForm.pullback, ivRank: gateForm.ivRank, spy50DMA: gateForm.spy50DMA, tenYok: gateForm.tenYok },
    plan: { size: gateForm.size, dte: parseInt(gateForm.dte), takeProfit: gateForm.takeProfit, stopLoss: gateForm.stopLoss },
    reason: gateForm.reason,
    decision: 'trade'
  };
  // Create pending trade entry
  data.trades.push({
    id: Date.now(),
    date: today,
    symbol: gateForm.symbol,
    strategy: 'longCall',
    size: gateForm.size,
    dte: parseInt(gateForm.dte),
    entryPrice: null,
    exitPrice: null,
    result: null,
    note: gateForm.reason,
    gateId: today,
    compliant: true,
    status: 'pending'
  });
  save(data);
  showGateResult(data.gates[today]);
  showToast('✅ 决策门通过！去券商 App 执行吧。');
}

function showNoGo(reason){
  const today = now();
  data.gates[today] = {
    completed: true,
    timestamp: new Date().toISOString(),
    decision: 'no-trade',
    reason: reason
  };
  save(data);
  let html = `<div class="result-banner no"><div class="big">🔴</div><div class="msg">今天不交易</div><div class="detail">${reason}</div></div>`;
  html += `<button class="btn btn-outline btn-sm" onclick="resetGate()">重新检查</button>`;
  document.getElementById('gateContent').innerHTML = html;
  document.getElementById('gateSub').textContent = '决策已完成';
}

function showGateResult(g){
  let cls = g.decision==='trade'?'go':(g.decision==='no-trade'?'no':'wait');
  let emoji = g.decision==='trade'?'🟢':(g.decision==='no-trade'?'🔴':'🟡');
  let msg = g.decision==='trade'?'可以交易':(g.decision==='no-trade'?'今天不交易':'等待');
  let detail = g.decision==='trade'?
    `${g.symbol} · ${g.plan?.size||''} · ${g.plan?.dte||''} DTE · ${g.reason?.slice(0,40)||''}` :
    (g.reason||'');

  let html = `<div class="result-banner ${cls}"><div class="big">${emoji}</div><div class="msg">${msg}</div><div class="detail">${detail}</div></div>`;
  html += `<button class="btn btn-outline btn-sm" onclick="resetGate()">重新检查</button>`;
  document.getElementById('gateContent').innerHTML = html;
  document.getElementById('gateSub').textContent = '今日已完成 ✓';
}

function resetGate(){
  currentStep = 0;

}

function renderLog(){
  const trades = data.trades.filter(t => t.status !== 'deleted').reverse();
  const container = document.getElementById('logList');
  if(trades.length === 0){
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:.85rem">还没有交易记录。<br>完成决策门后自动创建。</div>';
    return;
  }
  let html = '';
  trades.forEach(t => {
    const cls = t.compliant ? 'compliant' : 'violated';
    const resCls = t.result > 0 ? 'win' : (t.result < 0 ? 'loss' : '');
    const resStr = t.result !== null ? (t.result > 0 ? '+$'+t.result : '-$'+Math.abs(t.result)) : '持仓中';
    const flag = t.gateId ? '' : ' 🚩';
    html += `<div class="trade-item ${cls}">
      <div class="trade-row-top">
        <span class="trade-symbol">${t.symbol}${flag}</span>
        <span class="trade-result ${resCls}">${resStr}</span>
      </div>
      <div class="trade-row-mid">${t.date} · ${t.strategy} · ${t.size||''} · ${t.dte||''}DTE</div>
      <div class="trade-row-bot">
        <span>${t.note?.slice(0,50)||''}</span>
        <span>${t.compliant?'✅ 合规':'🚩 未走决策门'}</span>
      </div>
      ${t.status === 'pending' ? `
      <div class="btn-row" style="margin-top:8px">
        <input type="number" id="res_${t.id}" placeholder="盈亏 $" style="flex:1;font-size:.9rem;padding:8px 12px">
        <button class="btn btn-sm btn-primary" onclick="closeTrade(${t.id})" style="width:auto">平仓</button>
      </div>` : ''}
    </div>`;
  });
  container.innerHTML = html;
}

function closeTrade(id){
  const resEl = document.getElementById('res_'+id);
  const result = parseFloat(resEl?.value);
  if(isNaN(result)){ showToast('请输入盈亏金额'); return; }
  const t = data.trades.find(x => x.id === id);
  if(!t) return;
  t.result = result;
  t.status = 'closed';
  t.exitDate = now();
  save(data);
  renderLog();
  showToast(result > 0 ? '💰 盈利记录已保存' : '📉 亏损记录已保存');
}

  { id:'q10', lv:2, cat:'strategy', type:'场景题', q:'你看好 NVDA 但嫌直接买正股太贵。想用期权加杠杆做多，该用什么？', opts:['卖 Put','买 Call','卖 Call','买 Put'], ans:1, src:'Tastytrade 策略指南', exp:'买 Call = 用权利金撬动 100 股上涨收益。投入小、杠杆大，但时间损耗 (Theta) 是敌人。方向对但涨太慢也会亏。' },
  { id:'q11', lv:2, cat:'strategy', type:'概念题', q:'Bull Call Spread（牛市看涨价差）是怎么构建的？', opts:['买低行权价 Call + 卖高行权价 Call','卖低行权价 Call + 买高行权价 Call','买 Call + 买 Put 同一行权价','卖 Call + 卖 Put'], ans:0, src:'OIC 策略课程', exp:'Bull Call Spread = Buy 低行权 Call + Sell 高行权 Call。最大亏损 = 净支出，最大盈利 = 行权价差 - 净支出。成本低于裸买 Call。' },
  { id:'q12', lv:2, cat:'strategy', type:'概念题', q:'Sell Put（卖 Put）的本质是什么？', opts:['看空股票下跌','愿意以行权价买入股票，同时收权利金','预测股价将大涨','无风险的套利策略'], ans:1, src:'Tastytrade 策略指南', exp:'卖 Put = 你承诺"如果跌到行权价我就买"。适合你想以更低价格接货，或认为不会跌破某价。要确保你愿意且有能力接货。' },
  { id:'q13', lv:2, cat:'strategy', type:'场景题', q:'你预测 SPY 未来一个月在 740-760 之间震荡，IV 偏高。最佳策略？', opts:['买 Straddle','Sell Iron Condor（卖铁鹰）','买 Call','卖裸 Put'], ans:1, src:'Tastytrade 策略指南', exp:'Iron Condor = 卖一个 OTM Call Spread + 卖一个 OTM Put Spread。适合"不会大涨也不会大跌"的震荡市，高 IV 时权利金更肥。' },
  { id:'q14', lv:2, cat:'strategy', type:'场景题', q:'你想买 NVDA Call 但觉得权利金太贵。怎样降低成本？', opts:['买更远期的 Call','用 Call Debit Spread 替代裸买 Call','买更多张 Call','买更虚值的 Call'], ans:1, src:'OIC 策略课程', exp:'Call Debit Spread = 买 Call + 卖更高行权 Call。你卖出的 Call 收权利金，抵减成本。但代价是上档利润被封顶。' },
  { id:'q15', lv:2, cat:'strategy', type:'概念题', q:'Credit Spread 和 Debit Spread 最核心的区别？', opts:['没区别','Credit Spread 开仓收钱（净收入），Debit Spread 开仓付钱（净支出）','Credit Spread 风险更大','只有 Credit Spread 有限亏损'], ans:1, src:'OIC 策略课程', exp:'Credit Spread 开仓时收净权利金（钱进账），靠时间流逝赚钱。Debit Spread 开仓时付净权利金（钱出去），靠方向赚。' },
  { id:'q16', lv:2, cat:'strategy', type:'场景题', q:'Credit Spread 和裸卖 Put 的核心区别？', opts:['没有区别','Credit Spread 有买入保护腿，最大亏损有限','Credit Spread 收益更高','裸卖 Put 更安全'], ans:1, src:'OIC 策略课程', exp:'Credit Spread = Sell + Buy 两条腿，买入腿限定了最大亏损。裸卖 Put 理论上可以亏到零。' },

  // ═══ L3: 希腊字母 ═══
  { id:'q17', lv:3, cat:'greeks', type:'概念题', q:'Delta-neutral 是什么意思？', opts:['完全没有风险','整体持仓 Delta 接近 0，股价小波动不影响总价值','期权已经到期','只持有一张期权'], ans:1, src:'CBOE 做市商教育', exp:'Delta-neutral = 组合的 Delta 总和 ≈ 0，股价小波动不赚钱也不亏钱。做市商常用。但 Gamma 还在，大波动仍影响。' },
  { id:'q18', lv:3, cat:'greeks', type:'计算题', q:'你持有 Call (Delta=0.60, Gamma=0.03)。股价跌 $1。新的 Delta 约多少？', opts:['0.60','0.63','0.57','0.30'], ans:2, src:'OCC 希腊字母进阶', exp:'新 Delta ≈ 旧 Delta + Gamma × 价格变化 = 0.60 + 0.03 × (-1) = 0.57。Gamma 改变了 Delta，这就是为什么 Delta 不是常数。' },
  { id:'q19', lv:3, cat:'greeks', type:'概念题', q:'Gamma scalping（伽马倒卖）在什么情况下有利可图？', opts:['任何时候都赚钱','实现波动率 > 隐含波动率','IV 很高时','股价不动时'], ans:1, src:'CBOE 做市商教育', exp:'Gamma scalping = 持有正 Gamma + 频繁 Delta 对冲。当实际波幅 > 买入期权时的 IV，倒卖收益超过 Theta 损耗 → 赚钱。做市商就是这样活的。' },
  { id:'q20', lv:3, cat:'greeks', type:'概念题', q:'Vega 衡量什么？', opts:['时间损耗速度','股价敏感度','期权价格对隐含波动率的敏感度','利率敏感度'], ans:2, src:'OCC 希腊字母入门', exp:'Vega = IV 变动 1 个百分点，期权价格变动多少。买期权 = 做多 Vega（希望 IV 涨），卖期权 = 做空 Vega（希望 IV 跌）。' },
  { id:'q21', lv:3, cat:'greeks', type:'场景题', q:'临到期时，ATM 期权的 Gamma 会怎样？', opts:['趋近于 0','暴涨 — 可能引发"Gamma 爆炸"','不变','变成负数'], ans:1, src:'CBOE 做市商教育', exp:'临到期 ATM 期权的 Gamma 飙升——股价微小变动都导致 Delta 剧烈跳动。对卖方极度危险，对买方是暴击机会。这就是"Gamma 爆炸"。' },
  { id:'q22', lv:3, cat:'greeks', type:'概念题', q:'深度虚值期权（far OTM）的 Delta 接近多少？', opts:['1.0','0.5','0','-1.0'], ans:2, src:'OCC 希腊字母入门', exp:'深度虚值期权几乎不可能行权 → Delta ≈ 0。意味着股价变动几乎不影响期权价格。Gamma 也 ≈ 0。' },
  { id:'q23', lv:3, cat:'greeks', type:'概念题', q:'哪种希腊字母对利率最敏感？', opts:['Delta','Gamma','Vega','Rho'], ans:3, src:'OCC 希腊字母入门', exp:'Rho = 利率敏感度。短期期权通常忽略 Rho。但在你关心的场景（10Y 波动 ≥15bp → 不开仓），利率确实影响期权定价和宏观环境。' },
  { id:'q24', lv:3, cat:'greeks', type:'场景题', q:'组合 Delta +0.30, Gamma -0.02, Vega -0.01。股价小涨 + IV 上升，结果是？', opts:['一定赚钱','不确定 — 正 Delta 有利，负 Vega 和负 Gamma 拖后腿','一定亏钱','只取决于 Vega'], ans:1, src:'CBOE 做市商教育', exp:'正 Delta 享受股价上涨，但负 Vega 因 IV 上升亏钱，负 Gamma 让 Delta 随上涨而下降。净结果取决于哪个影响更大。' },

  // ═══ L4: 波动率 ═══
  { id:'q25', lv:4, cat:'volatility', type:'概念题', q:'IV Crush 通常在什么时候发生？', opts:['财报发布前','重大事件（财报/FOMC/CPI）落地后','VIX 上涨时','股价大涨时'], ans:1, src:'Tastytrade 波动率教育', exp:'事件前 IV 飙升（不确定性定价），事件一落地 → 不确定性消失 → IV 暴跌。此时即使方向对了，Vega 亏损也可能吃掉方向收益。' },
  { id:'q26', lv:4, cat:'volatility', type:'概念题', q:'IV Rank 80 是什么意思？', opts:['IV 比过去一年 80% 的时间都高','波动率是 80%','比昨天高 80%','80% 交易者有 IV'], ans:0, src:'Tastytrade 波动率教育', exp:'IV Rank = 当前 IV 在过去一年 IV 范围中的百分位。80 = 比 80% 的时间都贵 → 适合卖期权；20 = 比 80% 的时间都便宜 → 适合买期权。' },
  { id:'q27', lv:4, cat:'volatility', type:'概念题', q:'IV 和 HV（历史波动率）的区别是什么？', opts:['完全一样','IV 是市场对未来波动的预期，HV 是过去实际波动的统计','HV 永远比 IV 高','IV 是计算出来的，HV 是靠猜的'], ans:1, src:'Tastytrade 波动率教育', exp:'IV = 市场用期权价格反向推算的"未来预期波动"。HV = 已发生的价格波动的统计。IV-HV 差值 = 波动率风险溢价。' },
  { id:'q28', lv:4, cat:'volatility', type:'概念题', q:'波动率微笑/偏斜（Volatility Skew）说明什么？', opts:['市场对大幅波动的概率预期是均匀的','虚值 Put 的 IV 通常高于虚值 Call — 市场更怕暴跌','IV 对所有行权价相同','期权定价出错'], ans:1, src:'CBOE 波动率研究', exp:'Put Skew = OTM Put 的 IV > OTM Call 的 IV，尤其在股票/股指。因为市场参与者大量买 Put 对冲尾部风险（怕暴跌），需求推高了 Put 的价格。' },
  { id:'q29', lv:4, cat:'volatility', type:'场景题', q:'财报前 IV 飙升，你买 Call 赌财报。结果股价涨了 5% 但 Call 反而亏了。为什么？', opts:['不可能发生','IV crush 的 Vega 亏损超过方向收益','做市商操纵','选错了行权价'], ans:1, src:'Tastytrade 波动率教育', exp:'财报前 IV 极高 → 你付了昂贵的"不确定性溢价"。财报后 IV crush → Vega 暴跌。即使股价涨了方向正确，Vega 亏损可能更大。这就是"买对了方向却亏了钱"。' },
  { id:'q30', lv:4, cat:'volatility', type:'概念题', q:'VIX 指数衡量什么？', opts:['SPY 的价格趋势','SPX 期权的 30 天隐含波动率预期','美债波动率','成交量'], ans:1, src:'CBOE VIX 白皮书', exp:'VIX = SPX 期权的 30 天 IV 加权平均。VIX 高 = 市场恐慌/不确定性高 = 期权贵。VIX < 15 = 低波动环境；VIX > 30 = 高恐慌。' },
  { id:'q31', lv:4, cat:'volatility', type:'场景题', q:'VIX 在 12（年内低位），你预期波动率要回升。最佳策略？', opts:['卖 Iron Condor','买 Straddle 或 Strangle','卖 Covered Call','裸卖 Put'], ans:1, src:'Tastytrade 波动率教育', exp:'IV 在低位 → 期权便宜 → 适合买期权（做多 Vega）。买 Straddle/Strangle = 同时买 Call + Put，赌大波动。赚 Gamma 也赚 Vega 回升。' },

  // ═══ L5: 风险管理 ═══
  { id:'q32', lv:5, cat:'risk', type:'概念题', q:'PDT 规则要求账户 < $25,000 时，5 天内最多几次日内交易？', opts:['无限','3 次','5 次','1 次'], ans:1, src:'FINRA PDT 规则', exp:'PDT = Pattern Day Trader。账户 < $25,000 时，5 个交易日 ≤ 3 次日内交易（开+平 = 一次）。超过被限制 90 天。' },
  { id:'q33', lv:5, cat:'risk', type:'场景题', q:'你连续亏损 4 笔标准出击。按你的框架应该？', opts:['加大仓位翻本','暂停 3 天，只观察不开仓','换标的继续','无所谓，继续'], ans:1, src:'期权操盘计划', exp:'连亏 4 笔 → 暂停 3 天。这不是惩罚，是冷却大脑。连续亏损时判断力急速下降，"翻本心态"是归零最快路径。' },
  { id:'q34', lv:5, cat:'risk', type:'概念题', q:'凯利公式 (Kelly Criterion) 的核心作用是？', opts:['预测股价方向','计算最优下注比例以最大化长期复利','保证每次赚钱','确定行权价'], ans:1, src:'量化金融经典', exp:'Kelly: f* = (bp - q) / b。结合胜率和赔率算出最优仓位比例。全押 = 迟早归零，太保守 = 浪费机会。实操中常用 1/2 Kelly 或 1/4 Kelly。' },
  { id:'q35', lv:5, cat:'risk', type:'场景题', q:'你同时持有 NVDA Call + SOXX Call，两者高度相关。风险在哪？', opts:['没风险','黑天鹅时一起暴跌——你没有真正的分散','NVDA 涨 SOXX 一定跌','这种组合不合法'], ans:1, src:'风险管理实务', exp:'NVDA 是 SOXX 最大成分股，相关系数极高 → 你的"分散"是假的。真正的分散要求低相关资产。黑天鹅时它们一起崩。' },
  { id:'q36', lv:5, cat:'risk', type:'场景题', q:'持仓 SOXX Call 赚了 +80%，你怎么办？', opts:['全平','卖一半锁利 + 剩下一半设保本止损','加仓','换更虚的 Call'], ans:1, src:'期权操盘计划', exp:'+80% → 卖一半锁利（已落袋），剩下一半止损收紧到保本线。既锁定利润又留暴击空间。最差：回到保本线平推。最好：继续起飞。' },
  { id:'q37', lv:5, cat:'risk', type:'概念题', q:'你的三池系统中"战略储备金"触发条件是什么？', opts:['任何时候感觉机会来了','期权账户回撤 >50%、黑天鹅、重大催化剂','每个月固定释放','永远不动'], ans:1, src:'期权操盘计划', exp:'储备金有严格触发条件——回撤过半、真正的黑天鹅、或罕见的催化剂突变。不是感觉来了就能动。这是你和自己的契约。' },
  { id:'q38', lv:5, cat:'risk', type:'场景题', q:'你持仓已达 4 笔上限（NVDA/SOXX/DRAM/INTC）。SOXX 回调 4% 想加仓，可以吗？', opts:['可以 — 回调到位了','不可以 — 先平一笔再开新仓','可以 — SOXX 是主力标的','不管上限直接买'], ans:1, src:'期权操盘计划', exp:'同时持仓 ≤ 4 笔是硬上限。想开新仓？先平一笔释放兵力。上限是给你设的保护，不是拿来破的。' },

  // ═══ L6: 事件交易与进阶 ═══
  { id:'q39', lv:6, cat:'events', type:'场景题', q:'CPI 发布前 2 小时，SPY 748，IV Rank 85。你应该？', opts:['趁 IV 高卖 Credit Spread','买 Call 赌数据利好','等待数据落地 + IV crush 完成后再评估','买 Put 对冲'], ans:2, src:'宏观事件交易规则', exp:'事件前 IV 极高 → 买期权太贵 → 卖期权风险太大。正确：等数据落地 + IV crush 完成 + 方向确认后再入场。慢一步不会错过什么，急一步可能亏掉一切。' },
  { id:'q40', lv:6, cat:'events', type:'场景题', q:'今天是 FOMC 日，DRAM 回调了 5%。你应该？', opts:['趁回调买入 — 跌到位了','等 FOMC 落地 + 趋势确认后再入场','买 Put 对冲','先买一半'], ans:1, src:'宏观事件交易规则', exp:'事件日禁止开新仓——回调再漂亮也不行。等事件落地、IV crush 完成、趋势确认。"晚做巧做"比"早了踩雷"强一万倍。' },
  { id:'q41', lv:6, cat:'events', type:'场景题', q:'你持仓一张 Call 穿过财报。财报后股价大涨 10%，但你的 Call 只涨了 20%。为什么？', opts:['做市商出错','IV crush 吃掉大部分涨幅 — Vega 亏损','期权已经到期','股票分红'], ans:1, src:'Tastytrade 事件交易', exp:'财报前 IV 极高 → 你买的 Call 含大量 Vega。财报后 IV crush → Vega 暴跌 30-50 个点。即使股价涨了，方向收益的大部分被 Vega 亏损抵消。这是"买财报"最常见的亏法。' },
  { id:'q42', lv:6, cat:'events', type:'概念题', q:'Iron Condor（铁鹰）最大利润怎么计算？', opts:['行权价差','收取的净权利金','行权价差 - 净权利金','无限'], ans:1, src:'OIC 进阶策略', exp:'Iron Condor 最大利润 = 开仓时收的净权利金。最大亏损 = 行权价宽度 - 净权利金。选择行权价时，风险回报比是关键。' },
  { id:'q43', lv:6, cat:'advanced', type:'场景题', q:'你卖了一个 Short Strangle，突然股价向上跳空 5% + IV 飙升 40%。第一步？', opts:['什么都不做','立即买股票对冲正 Delta','卖掉所有持仓','加仓更多 Strangle'], ans:1, src:'CBOE 做市商教育', exp:'Short Strangle 跳空 + IV 飙升 = 双重暴击。第一步：立即 Delta 对冲（买正股或买 Call）中性化 Delta，止损流血。然后再评估是否平仓或调整。' },
  { id:'q44', lv:6, cat:'advanced', type:'场景题', q:'你持有 Iron Condor，距到期 5 天，股价逼近短 Call 行权价。主要风险是？', opts:['Theta 太快','Gamma 爆炸 — 小波动导致 Delta 剧烈摆动','IV 微微变化','股息'], ans:1, src:'CBOE 做市商教育', exp:'临到期 + 股价逼近短腿 = Gamma 爆炸。股价每跳 $0.10，Delta 可能从 -0.30 跳到 -0.70。对卖方极危险。此时要么平仓要么滚动调整，不能坐等。' },
  { id:'q45', lv:6, cat:'advanced', type:'场景题', q:'IV 在历史低位（IV Rank < 10），你预期波动率要回归。哪种策略最优？', opts:['卖 Iron Condor','买 Calendar Spread（日历价差）','卖 Covered Call','裸卖高 IV 股票 Put'], ans:1, src:'Tastytrade 进阶策略', exp:'低 IV 时买 Calendar Spread（卖近月 + 买远月）→ 近月 Theta 衰减快于远月 → 赚时间差。且正 Vega 在 IV 回升时受益。低 IV 时卖期权是捡钢镚。' },
  { id:'q46', lv:6, cat:'advanced', type:'场景题', q:'在流动性差的市场做 Delta 动态对冲，最大挑战是什么？', opts:['方向判断','宽买卖价差 → 对冲成本过高','没有挑战','找不到标的'], ans:1, src:'CBOE 做市商教育', exp:'流动性差 = bid-ask spread 宽。每次对冲都要"过价差"——买入用 ask，卖出用 bid。频繁对冲 → 价差累计成本吃掉收益。' },
  { id:'q47', lv:6, cat:'advanced', type:'概念题', q:'Collar（领圈策略）的构建方法是？', opts:['持股 + 卖 Call + 买 Put','只买 Put','只卖 Call','买 Call + 买 Put'], ans:0, src:'OIC 进阶策略', exp:'Collar = 持有正股 + 买 Put（保护下行）+ 卖 Call（抵减 Put 成本）。成本可接近零。代价是上档被封顶。适合"想保护但不想花钱"的场景。' },

function getTodayQuestions(){
  const today = now();
  if(data.quiz.daily[today] && data.quiz.daily[today].length > 0){
    return data.quiz.daily[today];
  }
  // 5 questions daily, one from each level 1-5, level 6 cycles in
  const picked = [];
  const levels = [1,2,3,4,5,6];
  const seed = parseInt(today.replace(/-/g,'')) % 6;
  const order = [...levels.slice(seed), ...levels.slice(0,seed)];

  for(let lv of order){
    if(picked.length >= 5) break;
    // Prefer due reviews in this level
    const pool = QUIZ_POOL.filter(q => q.lv === lv);
    const due = pool.filter(q => {
      const ans = data.quiz.answers[q.id];
      if(!ans) return true;
      if(data.quiz.mastered.includes(q.id)) return false;
      const last = ans.history[ans.history.length-1]?.date;
      if(!last) return true;
      const next = new Date(last);
      next.setDate(next.getDate() + (ans.streak >= 3 ? 7 : (ans.streak >= 1 ? 3 : 1)));
      return new Date() >= next;
    });
    const q = due.length > 0 ? due[Math.floor(Math.random()*due.length)] : pool[Math.floor(Math.random()*pool.length)];
    if(q) picked.push(q.id);
  }
  data.quiz.daily[today] = picked;
  save(data);
  return picked;
}

function totalAnsEver(){
  return Object.values(data.quiz.answers).reduce((s,a)=>s+a.history.length,0);
}
function renderLearn(){
  const today = now();
  const qids = getTodayQuestions();
  const questions = qids.map(id => QUIZ_POOL.find(q => q.id === id)).filter(Boolean);

  let done = 0;
  questions.forEach(q => { if(data.quiz.answers[q.id]?.history?.some(h=>h.date===today)) done++; });
  document.getElementById('quizToday').textContent = done;
  document.getElementById('quizTotal').textContent = questions.length;
  document.getElementById('quizStreak').textContent = data.quiz.streak || 0;

  let html = '';
  questions.forEach((q, i) => {
    const ans = data.quiz.answers[q.id];
    const answeredToday = ans?.history?.some(h => h.date === today);
    html += `<div class="quiz-card">
      <div class="quiz-type">L${q.lv} ${q.type} · ${q.cat}</div>
      <div class="quiz-question">${i+1}. ${q.q}</div>`;
    if(answeredToday){
      const last = ans.history[ans.history.length-1];
      html += `<ul class="quiz-options">`;
      q.opts.forEach((o, j) => {
        let cls = '';
        if(j === q.ans) cls = 'correct';
        else if(j === last.chosen && j !== q.ans) cls = 'wrong';
        html += `<li class="${cls}">${o} ${j===q.ans?'✓':''} ${j===last.chosen&&j!==q.ans?'✗':''}</li>`;
      });
      html += `</ul>`;
      html += `<div class="quiz-feedback show ${last.chosen===q.ans?'good':'bad'}">${q.exp}</div>`;
      html += `<div class="quiz-source">📖 来源：${q.src}</div>`;
    } else {
      html += `<ul class="quiz-options" id="quizOpts_${q.id}">`;
      q.opts.forEach((o, j) => {
        html += `<li onclick="answerQuiz('${q.id}',${j})">${o}</li>`;
      });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  const emptyMsg = totalAnsEver() > 0
    ? '🎉 今天题目已全部完成！明天再来。'
    : '📚 题库已就绪，50 题分 6 层级。每天 5 题，由浅入深。';
  document.getElementById('quizContent').innerHTML = html || '<div style="text-align:center;color:var(--muted);padding:20px">'+emptyMsg+'</div>';
}

function answerQuiz(qid, chosen){
  const q = QUIZ_POOL.find(x => x.id === qid);
  if(!q) return;
  const today = now();
  const correct = chosen === q.ans;

  if(!data.quiz.answers[qid]) data.quiz.answers[qid] = { history:[], streak:0 };
  const ans = data.quiz.answers[qid];
  ans.history.push({ date: today, chosen, correct });
  if(correct){
    ans.streak = (ans.streak||0) + 1;
    if(ans.streak >= 3 && !data.quiz.mastered.includes(qid)) data.quiz.mastered.push(qid);
    data.quiz.streak = (data.quiz.streak||0) + 1;
    if(data.quiz.streak > (data.quiz.maxStreak||0)) data.quiz.maxStreak = data.quiz.streak;
  } else {
    ans.streak = 0;
    data.quiz.streak = 0;
    if(data.quiz.mastered.includes(qid)) data.quiz.mastered = data.quiz.mastered.filter(x=>x!==qid);
  }
  save(data);
  renderLearn();
}

function renderDash(){
  const trades = data.trades.filter(t => t.status === 'closed');
  const compliant = trades.filter(t => t.compliant);
  const violated = trades.filter(t => !t.compliant);
  const gateDays = Object.keys(data.gates).filter(k => data.gates[k].completed);
  const blocks = Object.values(data.gates).filter(g => g.decision === 'no-trade');

  const gateRate = trades.length > 0 ? Math.round(compliant.length/trades.length*100) : 0;
  const compWins = compliant.filter(t => t.result > 0);
  const compWinRate = compliant.length > 0 ? Math.round(compWins.length/compliant.length*100) : 0;
  const vioWins = violated.filter(t => t.result > 0);
  const vioWinRate = violated.length > 0 ? Math.round(vioWins.length/violated.length*100) : 0;
  const compTotal = compliant.reduce((s,t)=>s+(t.result||0),0);
  const vioTotal = violated.reduce((s,t)=>s+(t.result||0),0);

  // Trust score: based on gate usage, win rate differential, and blocking
  let trustScore = 50;
  if(trades.length >= 3){
    trustScore += Math.min(25, gateRate * 0.25);
    if(compWinRate > vioWinRate) trustScore += Math.min(15, (compWinRate - vioWinRate) * 0.5);
    trustScore += Math.min(10, blocks.length * 3);
  }

  document.getElementById('trustScore').textContent = Math.round(Math.min(100, trustScore));
  document.getElementById('trustTrend').textContent = trustScore > 60 ? '↗ 系统在帮你' : '— 样本不足';
  document.getElementById('trustTrend').className = 'trend ' + (trustScore > 60 ? 'up' : '');

  document.getElementById('dGateRate').textContent = trades.length >= 3 ? gateRate+'%' : '--';
  document.getElementById('dCompWin').textContent = compliant.length >= 3 ? compWinRate+'%' : '--';
  document.getElementById('dVioWin').textContent = violated.length >= 1 ? vioWinRate+'%' : '--';
  document.getElementById('dBlock').textContent = blocks.length || '--';

  let insight = '';
  if(trades.length < 3){
    insight = '📌 数据还不够。至少做 5 笔合规交易后，信任看板才会有意义的信号。';
  } else if(compWinRate > vioWinRate && compliant.length >= 3){
    insight = `<strong>✅ 系统正在帮你。</strong> 合规交易胜率（${compWinRate}%）高于违规交易（${vioWinRate}%）。每走一次决策门，你的预期收益都在提高。`;
  } else if(compliant.length >= 3){
    insight = `📊 样本还在积累。合规 ${compliant.length} 笔（胜率 ${compWinRate}%），违规 ${violated.length} 笔（胜率 ${vioWinRate}%）。继续按系统走。`;
  } else {
    insight = '🔍 多走几次决策门，让数据告诉你系统有没有用。';
  }
  document.getElementById('dInsight').innerHTML = insight;

  // Learning stats
  const totalAns = Object.values(data.quiz.answers).reduce((s,a)=>s+a.history.length,0);
  const correctAns = Object.values(data.quiz.answers).reduce((s,a)=>s+a.history.filter(h=>h.correct).length,0);
  const correctRate = totalAns > 0 ? Math.round(correctAns/totalAns*100) : 0;
  // Level breakdown
  const levelNames = {1:'基础',2:'策略',3:'希腊',4:'波动率',5:'风险',6:'进阶'};
  let levelStats = {};
  [1,2,3,4,5,6].forEach(lv => {
    const qs = QUIZ_POOL.filter(q => q.lv === lv);
    const mastered = qs.filter(q => data.quiz.mastered.includes(q.id)).length;
    levelStats[lv] = {total: qs.length, mastered};
  });

  document.getElementById('dQTotal').textContent = totalAns || '--';
  document.getElementById('dQCorrect').textContent = totalAns > 0 ? correctRate+'%' : '--';
  document.getElementById('dQStreak').textContent = data.quiz.maxStreak || '--';
  document.getElementById('dQMastered').textContent = data.quiz.mastered.length || '--';

  let learnInsight = '';
  if(data.quiz.mastered.length >= 5){
    learnInsight = '<strong>📚 ' + data.quiz.mastered.length + '</strong> 个知识点已掌握。<br>';
    learnInsight += '<span style="font-size:.8rem">' + [1,2,3,4,5,6].map(lv => {
      const s = levelStats[lv];
      return 'L'+lv+levelNames[lv]+' ' + s.mastered + '/' + s.total;
    }).join(' · ') + '</span>';
  } else if(totalAns > 0){
    learnInsight = '📖 已答 ' + totalAns + ' 题，正确率 ' + correctRate + '%。每天 5 题，从基础到进阶层层打通。';
  } else {
    learnInsight = '🎯 去"学习"Tab 做今天的 5 道题吧。每天 2 分钟，6 层级由浅入深。';
  }
  document.getElementById('dLearnInsight').innerHTML = learnInsight;
}

function checkUpdate(){
  if(!navigator.onLine){ showToast('📡 无网络，无法检查更新'); return; }
  // Unregister old SW, clear caches, reload
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs => {
      Promise.all(regs.map(r => r.unregister())).then(() => {
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
          window.location.reload(true);
        });
      });
    });
  } else {
    location.reload(true);
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '决策系统数据_' + now() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📤 导出完成 → 存到 Obsidian Vault/02-股票/');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const d = JSON.parse(ev.target.result);
      if(d.gates && d.trades && d.quiz){
        data = d;
        save(data);
        renderGate();
        renderDash();
        showToast('📥 数据已导入 ' + Object.keys(data.gates).length + ' 天决策 + ' + data.trades.length + ' 笔交易');
      } else {
        showToast('⚠️ 文件格式不对');
      }
    }catch(ex){
      showToast('⚠️ 文件解析失败');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
